{% extends "base.html" %}

{% block content %}
<div class="container mx-auto mt-8 flex justify-center items-center px-6 py-10 bg-gray-400 rounded-lg w-3/4 max-w-3xl">
    <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">
        <!-- ✅ Header -->
        <h2 class="text-2xl font-semibold text-gray-800 text-center mb-4">Reset Password</h2>

        <!-- ✅ Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="bg-{{ category }}-100 text-{{ category }}-700 p-3 rounded mb-3">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- ✅ Reset Request Form -->
        <form method="POST" class="space-y-4">
            <div>
                <label for="email" class="block text-gray-700 font-medium">Enter your email</label>
                <input type="email" id="email" name="email" required
                       class="w-full border border-gray-400 rounded-lg p-2 focus:ring focus:ring-blue-300 bg-white text-gray-900">
            </div>

            <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600">
                Send Reset Link
            </button>
        </form>
    </div>
</div>

{% endblock %}
