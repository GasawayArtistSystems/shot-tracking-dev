{% extends "base.html" %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    Swal.fire({
        icon: "{{ level or 'error' }}",
        title: "{{ message or 'Access Denied' }}",
        showConfirmButton: true,
        confirmButtonColor: '#d33'
    }).then(() => {
        window.history.back(); // go back or redirect
    });
</script>
{% endblock %}
