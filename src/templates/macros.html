{% macro modal(id, title, body_html, footer_html) %}
<div id="{{ id }}" class="fixed inset-0 z-50 hidden bg-black bg-opacity-50 flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-lg p-6 w-full max-w-3xl bg-red-950 text-white">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-black">{{ title }}</h2>
            <button onclick="document.getElementById('{{ id }}').classList.add('hidden')"
                class="text-gray-400 hover:text-white text-xl">&times;</button>
        </div>
        <div class="modal-body">
            {{ body_html | safe }}
        </div>
        <div class="mt-6 flex justify-end space-x-2">
            {{ footer_html | safe }}
        </div>
    </div>
</div>
{% endmacro %}
