{% extends "base.html" %}

{% block content %}
<div class="container mx-auto mt-8 flex justify-center items-center px-6 py-10 bg-red-950 rounded-lg w-3/4 max-w-3xl">
    <div class="bg-black shadow-lg rounded-lg p-8 w-full max-w-md">
        <!-- ✅ Header -->
        <h2 class="text-2xl font-semibold text-white text-center mb-4">Login</h2>

        <!-- ✅ Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="p-3 rounded mb-3 font-semibold"
                    style="background-color: var(--flash-bg, #f8d7da); color: var(--flash-text, #721c24);">
                    {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- ✅ Login Form -->
        <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-4">
            <div>
                <label for="login_name" class="block text-white font-medium">Username</label>
                <input type="text" id="login_name" name="login_name" required
                       class="w-full border border-gray-400 rounded-lg p-2 focus:ring focus:ring-blue-300 bg-white text-gray-900">
            </div>        

            <div>
                <label for="password" class="block text-white font-medium">Password</label>
                <div class="relative">
                    <input type="password" id="password" name="password" required
                           class="w-full border border-gray-400 rounded-lg p-2 pr-10 focus:ring focus:ring-blue-300 bg-white text-gray-900">
                    <button type="button" onclick="togglePasswordVisibility()" class="absolute right-3 top-2.5 text-gray-500">
                        <i id="password-toggle-icon" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="w-full bg-red-800 text-white py-2 rounded-lg hover:bg-red-600">
                Login
            </button>
        </form>

        <!-- ✅ Footer -->
        <div class="text-center text-gray-600 mt-4 text-sm">
            Forgot your password? 
            <a href="{{ url_for('auth.request_reset') }}" class="text-blue-500 hover:underline">Reset it here</a>
        </div>
    </div>
</div>


<!-- ✅ Password Visibility Toggle -->
<script>
    function togglePasswordVisibility() {
        const passwordField = document.getElementById('password');
        const passwordToggleIcon = document.getElementById('password-toggle-icon');

        if (passwordField.type === 'password') {
            passwordField.type = 'text';
            passwordToggleIcon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            passwordField.type = 'password';
            passwordToggleIcon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>
{% endblock %}
