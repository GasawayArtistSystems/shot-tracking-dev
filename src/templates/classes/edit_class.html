{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto mt-6">
    <h2 class="text-2xl font-semibold text-white mb-4">Edit Class</h2>

    <form method="POST" action="{{ url_for('classes.edit_class', class_id=class_data.id) }}" class="bg-red-900 p-6 rounded-lg shadow-lg">
        <div class="mb-4">
            <label for="class_name" class="block text-white">Class Name</label>
            <input type="text" id="class_name" name="class_name" class="w-full px-4 py-2 rounded-lg text-gray-900" 
                   value="{{ class_data.class_name }}" required>
        </div>

        <div>
            <label for="semester_id" class="block font-medium">Semester</label>
            <select id="semester_id" name="semester_id" required class="w-full p-2 border rounded text-black">
              {% for semester in semesters %}
                <option value="{{ semester.id }}" {% if semester.id == class_data.semester_id %}selected{% endif %}>
                  {{ semester.label }}
                </option>
              {% endfor %}
            </select>
          </div>
        <div class="mb-4">
            <label for="instructor_id" class="block text-white">Instructor</label>
            <select id="instructor_id" name="instructor_id" class="w-full px-4 py-2 rounded-lg text-gray-900" required>
                {% for instructor in instructors %}
                <option value="{{ instructor.id }}" {% if class_data.instructor_id == instructor.id %}selected{% endif %}>
                    {{ instructor.name }}
                </option>
                {% endfor %}
            </select>
        </div>        

        <div class="mb-4">
            <label for="description" class="block text-white">Class Description</label>
            <textarea id="description" name="description" class="w-full px-4 py-2 rounded-lg text-gray-900 h-24" placeholder="Enter class description...">{{ class_data.description or '' }}</textarea>
        </div>

        {% if prompt_confirm %}
        <div class="bg-yellow-500 text-black p-4 mb-4 rounded">
            Folder structure has changed. Do you want to delete old folders and create new ones?
            <div class="mt-2">
                <label class="text-white">
                    <input type="radio" name="confirm_folder_change" value="yes" required> Yes
                </label>
                <label class="ml-4 text-white">
                    <input type="radio" name="confirm_folder_change" value="no" required> No
                </label>
            </div>
        </div>
        {%endif %}

        <div class="flex space-x-4">
            <button type="submit" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg">
                Update Class
            </button>
            <a href="{{ url_for('classes.view_classes') }}" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg">
                Cancel
            </a>
        </div>
    </form>
</div>


{% endblock %}
