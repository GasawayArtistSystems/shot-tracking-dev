{% extends "base.html" %}

{% block content %}
<div class="flex justify-center items-start mt-10">
    <div class="bg-red-900 shadow-lg rounded-lg p-6 w-full max-w-2xl">
        <h2 class="text-3xl font-bold text-center text-white mb-6">Add New Class</h2>

        <form action="{{ url_for('classes.add_class_route') }}" method="POST" id="class-form">
            <!-- Semester, Code, and Class Number -->
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <div class="md:col-span-1">
                    <label for="semester_id" class="block text-white font-medium">Semester:</label>
                    <select id="semester_id" name="semester_id" class="w-full border text-gray-900 bg-white rounded-lg p-2 focus:ring focus:ring-blue-300" required onchange="updateClassPreview()">
                        {% for option in form_fields[0].options %}
                        <option value="{{ option['value'] }}">{{ option['label'] }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="md:col-span-1">
                    <label for="code" class="block text-white font-medium">Course Code:</label>
                    <select id="code" name="code" class="w-full border text-gray-900 bg-white rounded-lg p-2 focus:ring focus:ring-blue-300" required onchange="updateClassPreview()">
                        {% for option in form_fields[1].options %}
                        <option value="{{ option.value }}">{{ option.label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="md:col-span-1">
                    <label for="class_number" class="block text-white font-medium">Class Number:</label>
                    <input type="text" id="class_number" name="class_number" class="w-full border text-gray-900 bg-white rounded-lg p-2 focus:ring focus:ring-blue-300" maxlength="4" placeholder="Enter class number" required oninput="updateClassPreview()">
                </div>
            </div>
            <!-- Class Name -->
            <div class="mt-4">
                <label for="class_name" class="block text-white font-medium">Class Name:</label>
                <input type="text" id="class_name" name="class_name" class="w-full border text-gray-900 bg-white rounded-lg p-2 focus:ring focus:ring-blue-300" placeholder="Enter class name" maxlength="100" required oninput="updateClassPreview()">
            </div>
            <!-- Class Preview -->
            <div class="mt-4">
                <label class="block text-white font-medium">Class Preview:</label>
                <div class="w-full border bg-gray-100 text-gray-900 rounded-lg p-3" id="class-preview"></div>
            </div>
            <!-- Instructor Dropdown -->
            <div class="mt-4">
                <label for="instructor_id" class="block text-white font-medium">Instructor:</label>
                <select id="instructor_id" name="instructor_id" class="w-full border text-gray-900 bg-white rounded-lg p-2 focus:ring focus:ring-blue-300" required>
                    {% for option in form_fields[2].options %}
                    <option value="{{ option.value }}">{{ option.label }}</option>
                    {% endfor %}
                </select>
            </div>
            <!-- Buttons -->
            <div class="flex justify-between mt-6">
                <a href="{{ url_for('classes.view_classes') }}" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg">Cancel</a>
                <button type="submit" class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600">Add Class</button>
            </div>
        </form>
    </div>
</div>

<script>
    function updateClassPreview() {
        const semester = document.getElementById('semester_id');
        const semesterText = semester?.options[semester.selectedIndex]?.text || '';
        const code = document.getElementById('code')?.value || '';
        const classNumber = document.getElementById('class_number')?.value || '';
        const className = document.getElementById('class_name')?.value || '';

        const preview = `${semesterText} - ${code} - ${classNumber} - ${className}`.trim();
        const previewEl = document.getElementById('class-preview');
        if (previewEl) previewEl.textContent = preview;
    }

    document.addEventListener('DOMContentLoaded', function () {
        updateClassPreview();

        document.getElementById('semester_id')?.addEventListener('change', updateClassPreview);
        document.getElementById('code')?.addEventListener('change', updateClassPreview);
        document.getElementById('class_number')?.addEventListener('input', updateClassPreview);
        document.getElementById('class_name')?.addEventListener('input', updateClassPreview);
    });
</script>



{% endblock %}
