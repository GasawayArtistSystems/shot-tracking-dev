{% macro settings_section(title, back_href) %}
<div class="container mx-auto mt-12 flex justify-center relative">
    <div class="w-full max-w-3xl bg-red-900 shadow-lg rounded-lg p-6 relative">
        <div class="flex justify-center items-center mb-4">
            <h2 class="text-2xl font-bold text-white text-center w-full">{{ title }}</h2>
            <a href="{{ back_href }}"
               class="absolute right-6 bg-gray-700 text-white px-4 py-2 rounded hover:bg-gray-600">
                Settings
            </a>
        </div>
        <hr class="mb-4">
        {{ caller() }}
    </div>
</div>
{% endmacro %}
