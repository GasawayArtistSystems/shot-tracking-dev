{% extends "base.html" %}

{% block content %}
<div class="container mx-auto mt-6 px-6">
    <h1 class="text-2xl font-bold text-gray-800 mb-4">Archive Films</h1>
    <p class="text-white mb-4">Select the films below to archive:</p>

    <form id="archive-form" method="POST" action="{{ url_for('admin.archive_films') }}">
        <div class="overflow-x-auto bg-white p-6 rounded-lg shadow-lg">
            <table class="table">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="border border-gray-300 p-3">
                            <input type="checkbox" id="select-all" onclick="toggleSelectAll()"> <!-- Select All -->
                        </th>
                        <th class="border border-gray-300 p-3 text-left bg-gray-200 text-black">Title</th>
                        <th class="border border-gray-300 p-3 text-left bg-gray-200 text-black">Release Date</th>
                        <th class="border border-gray-300 p-3 text-left bg-gray-200 text-black">Director</th>
                    </tr>
                </thead>
                <tbody>
                    {% for film in films_to_archive %}
                    <tr class="hover:bg-gray-100">
                        <td class="border border-gray-300 p-3 text-center text-black">
                            <input type="checkbox" name="film_ids" value="{{ film.id }}">
                        </td>
                        <td class="border border-gray-300 p-3">{{ film.title }}</td>
                        <td class="border border-gray-300 p-3">{{ film.release_date }}</td>
                        <td class="border border-gray-300 p-3">{{ film.director }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <div class="flex justify-end mt-4">
            <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">
                Archive Selected
            </button>
        </div>
    </form>
</div>

<script>
    // Select All functionality
    function toggleSelectAll() {
        const selectAll = document.getElementById('select-all');
        const checkboxes = document.querySelectorAll('input[name="film_ids"]');
        checkboxes.forEach(cb => cb.checked = selectAll.checked);
    }
</script>
{% endblock %}
