{% extends "base.html" %}

{% block content %}
<div class="container mx-auto mt-12 flex justify-center">
    <div class="bg-red-800 shadow-lg rounded-lg p-6 w-1/3">
        <h3 class="text-lg font-bold text-white mb-3">Settings</h3>
        <div class="bg-red-950 p-4 rounded-lg">
            <a href="{{ url_for('admin.manage_user_groups') }}" 
               class="block px-4 py-2 rounded-lg transition duration-200 
                      {% if active_tab == 'user_groups' %} bg-blue-500 text-white {% else %} text-white hover:bg-gray-500 {% endif %}">
                User Groups
            </a>
            <a href="{{ url_for('semesters.manage_semesters') }}" 
                class="block px-4 py-2 rounded-lg transition duration-200 
                    {% if active_tab == 'semesters' %} bg-blue-500 text-white {% else %} text-white hover:bg-gray-500 {% endif %}">
                Manage Semesters
            </a>
        </div>
    </div>
</div>
{% endblock %}
