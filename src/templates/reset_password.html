{% extends "base.html" %}

{% block content %}
<div class="flex justify-center items-center min-h-screen bg-gray-400 px-4">
    <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">
        <!-- ✅ Header -->
        <h2 class="text-2xl font-semibold text-gray-800 text-center mb-4">Set New Password</h2>

        <!-- ✅ Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="bg-{{ category }}-100 text-{{ category }}-700 p-3 rounded mb-3">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- ✅ Password Reset Form -->
        <form method="POST" class="space-y-4">
            <div>
                <label for="password" class="block text-gray-700 font-medium">New Password</label>
                <input type="password" id="password" name="password" required
                       class="w-full border border-gray-400 rounded-lg p-2 focus:ring focus:ring-blue-300 bg-white text-gray-900">
            </div>

            <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600">
                Reset Password
            </button>
        </form>
    </div>
</div>

{% endblock %}
