<div id="crewModal" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50">
  <div class="bg-red-900 text-white rounded-2xl p-6 w-full max-w-2xl shadow-lg">

    <!-- Modal Header -->
    <h2 class="text-2xl font-bold mb-6 text-center">Assign Crew for {{ film.name }}</h2>

    <!-- Scrollable Content Wrapper -->
    <div class="max-h-[80vh] overflow-y-auto pr-2">

      <form id="crewForm" method="POST" data-film-id="{{ film.id }}" class="space-y-6">

        <!-- ✅ 2-Column Coordinator Dropdowns -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          {% for role in coordinator_roles %}
          <div>
            <label class="block font-semibold mb-1">{{ role.name }}</label>
            <select name="crew[{{ role.id }}]" class="w-full p-2 rounded bg-white text-black border">
              <option value="">-- Unassigned --</option>
              {% for artist in artists %}
              {% set assigned = current_crew | selectattr('group_id', 'equalto', role.id)
              | selectattr('user_id', 'equalto', artist.id)
              | list %}
              <option value="{{ artist.id }}" {% if assigned %}selected{% endif %}>
                {{ artist.name }}
              </option>
              {% endfor %}
            </select>
          </div>
          {% endfor %}
        </div>

        <!-- ✅ Artists Section -->
        <div>
          <h3 class="text-lg font-bold mb-2">Artists</h3>

          <!-- SEARCH BAR -->
          <input id="artistSearchInput" type="text" placeholder="Search artists..."
            class="w-full mb-3 p-2 rounded bg-gray-800 text-white border border-gray-700" />

          <!-- ARTIST GRID -->
          <div id="artist-list" class="grid grid-cols-2 md:grid-cols-3 gap-3 bg-gray-800 p-4 rounded-lg">
            {% for artist in artists %}
            {% set assigned = current_crew
            | selectattr('group_id', 'equalto', 11)
            | selectattr('user_id', 'equalto', artist.id)
            | list
            %}

            <div class="artist-item" data-name="{{ artist.name }}">
              <label class="flex items-center gap-2 text-sm">
                <input type="checkbox" name="crew[11][]" value="{{ artist.id }}" {% if assigned %}checked{% endif %}
                  class="form-checkbox h-4 w-4 text-green-500" />
                {{ artist.name }}
              </label>
            </div>

            {% endfor %}
          </div>
        </div>

        <!-- Buttons -->
        <div class="flex justify-end gap-4 pt-4">
          <button type="button" onclick="closeCrewModal()"
            class="bg-gray-600 hover:bg-gray-700 px-4 py-2 rounded-lg text-white">
            Cancel
          </button>

          <button type="submit" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg text-white">
            Save Crew
          </button>
        </div>

      </form>

    </div>
    <!-- End Scroll Wrapper -->

  </div>
</div>
