<div class="container mt-4">
    <div class="row align-items-center">
        <!-- Dropdown for class selection -->
        <div class="col-md-4">
            <select class="form-select" id="class-dropdown" onchange="location = this.value;">
                {% for cls in all_classes %}
                <option value="{{ url_for(active_page, class_id=cls['id']) }}" 
                        {% if cls['id'] == class_id %}selected{% endif %}>
                    {{ cls['full_class_name'] }}
                </option>
                {% endfor %}
            </select>            
        </div>

        <!-- Subheader Navigation -->
        <div class="col-md-8 d-flex justify-content-end">
            <div class="btn-group" role="group">
                <a href="{{ url_for('classes.view_classes') }}" 
                   class="btn btn-outline-primary {% if active_page == 'classes' %}active{% endif %}">
                   Classes
                </a>
                <a href="{{ url_for('classes.view_students_in_class', class_id=class_id) }}" 
                   class="btn btn-outline-primary {% if active_page == 'students' %}active{% endif %}">
                   Students
                </a>
                <a href="{{ url_for('assignments.view_assignments', class_id=class_id) }}" 
                   class="btn btn-outline-primary {% if active_page == 'assignments' %}active{% endif %}">
                   Assignments
                </a>
            </div>
        </div>
    </div>
</div>
