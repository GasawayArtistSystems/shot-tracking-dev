{% extends "base.html" %}
{% block content %}
<div class="container mx-auto px-6 py-8">
    <h1 class="text-3xl font-bold mb-6 text-center">Help Videos</h1>

    <!-- 🔍 Search bar -->
    <div class="mb-8 text-center">
        <input type="text" id="searchInput" placeholder="Search videos..."
            class="w-full md:w-1/2 px-4 py-2 rounded-xl bg-gray-800 text-gray-200 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-400" />
    </div>

    <!-- 🎬 Video grid -->
    <div id="videoGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for video in videos %}
        <div class="video-card bg-gray-800 rounded-2xl shadow p-4 hover:shadow-lg transition"
            data-title="{{ video.title | lower }}">
            <a href="{{ url_for('help.help_video_detail', video_id=video.id) }}">
                <img src="{{ video.thumbnail }}" alt="{{ video.title }}" class="rounded-xl mb-4 w-full" />
                <h2 class="text-lg font-semibold text-white mb-1 truncate">{{ video.title }}</h2>
                <p class="text-gray-400 text-sm leading-snug line-clamp-2">
                    {{ video.summary }}
                </p>

            </a>
        </div>
        {% endfor %}
    </div>
</div>

<!-- 🔎 JavaScript filter -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const searchInput = document.getElementById("searchInput");
        const cards = document.querySelectorAll(".video-card");

        searchInput.addEventListener("input", function () {
            const term = this.value.toLowerCase();
            cards.forEach((card) => {
                const title = card.getAttribute("data-title");
                card.style.display = title.includes(term) ? "block" : "none";
            });
        });
    });
</script>

<style>
    /* Only show 2 lines of summary text */
    .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
</style>

{% endblock %}
