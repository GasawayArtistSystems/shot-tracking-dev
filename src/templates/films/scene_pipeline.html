{% extends "base.html" %}

{% block content %}

<div class="container mx-auto mt-6">

  <!-- HEADER -->
  <div class="bg-purple-900 rounded-lg shadow-lg p-6">

    <div class="flex justify-between items-center mb-4">

      <div>
        <h1 class="text-3xl font-bold text-white">Scene Pipeline Editor</h1>
        <div class="text-sm text-purple-200">
          Film: {{ film_name }}
        </div>
      </div>

      <div class="flex gap-2">

        <button onclick="window.location.href='/films'"
          class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg">
          Back
        </button>

      </div>

    </div>


    <!-- PIPELINE TABLE -->
    <div class="overflow-x-auto">

      <table class="w-full border-collapse bg-purple-950 shadow-md rounded-lg overflow-hidden">

        <thead>
          <tr class="bg-black text-white">
            <th class="p-3 text-left">Scene</th>
            <th class="p-3 text-left">Set</th>
            <th class="p-3 text-left">Rigs</th>
            <th class="p-3 text-left">Props</th>
            <th class="p-3 text-left">BG</th>
            <th class="p-3 text-left">Light Rig</th>
            <th class="p-3 text-left">Save</th>
          </tr>
        </thead>

        <tbody id="scenePipelineTableBody" class="text-white">

          <!-- JS populates this -->

        </tbody>

      </table>

    </div>

  </div>

</div>


<!-- MULTI SELECT MODAL -->

<div id="assetSelectModal"
     class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50">

  <div class="bg-white text-black rounded-lg shadow-lg p-6 w-full max-w-lg">

    <h2 class="text-xl font-bold mb-4">
      Select Assets
    </h2>

    <div id="assetSelectList"
         class="grid grid-cols-1 gap-2 max-h-[60vh] overflow-y-auto">
    </div>

    <div class="flex justify-end gap-2 mt-4">

      <button onclick="closeModal()"
        class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded-lg">
        Cancel
      </button>

      <button onclick="saveModalSelection()"
        class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg">
        Save
      </button>

    </div>

  </div>

</div>


<!-- JS -->
<script src="{{ url_for('static', filename='js/scene_pipeline.js') }}"></script>

<script>

document.addEventListener("DOMContentLoaded", function(){

    loadScenePipeline();

});

</script>

{% endblock %}
