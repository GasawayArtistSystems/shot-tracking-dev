{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto bg-red-900 p-6 rounded-2xl shadow-lg">
    <h2 class="text-white text-2xl font-bold mb-4">{{ 'Edit Scene' if scene else 'Add Scene' }}</h2>

    <form method="POST">
        <div class="flex space-x-4">
            <div class="flex-1">
                <label class="block text-white font-medium">Scene Number (3 letters)</label>
                <input type="text" name="scene_number" value="{{ scene.scene_number if scene else '' }}" required
                    minlength="3" maxlength="3" pattern=".{3}" class="w-full p-2 rounded text-black"
                    placeholder="e.g. A01" />
            </div>
            <div class="flex-1">
                <label class="block text-white font-medium">Start Date</label>
                <input type="date" name="start_date" value="{{ scene.start_date if scene else '' }}"
                    class="w-full p-2 rounded text-black" />
            </div>
            <div class="flex-1">
                <label class="block text-white font-medium">Due Date</label>
                <input type="date" name="due_date" value="{{ scene.due_date if scene else '' }}"
                    class="w-full p-2 rounded text-black" />
            </div>
        </div>

        <div class="mt-4">
            <label class="block text-white font-medium">Description</label>
            <textarea name="description" class="w-full p-2 rounded text-black"
                rows="4">{{ scene.description if scene else '' }}</textarea>
        </div>

        <div class="flex justify-between mt-6">
            <a href="{{ url_for('films.view_scenes', film_id=scene.film_id) }}"
                class="bg-gray-500 hover:bg-gray-400 text-white px-4 py-2 rounded">Cancel</a>
            <button type="submit" class="bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded">Save
                Changes</button>
        </div>
    </form>
</div>
{% endblock %}
