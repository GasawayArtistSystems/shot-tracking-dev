{% extends 'base.html' %}
{% block content %}
<div class="container mx-auto max-w-3xl bg-red-900 rounded-lg p-6 mt-6">
  <h2 class="text-2xl font-bold text-white mb-4">Add Scene</h2>

  <!-- ✅ Add Multiple Scenes Button -->
  <button onclick="document.getElementById('multiSceneModal').showModal()"
    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg mb-4">
    ➕ Add Multiple Scenes
  </button>

  <!-- ✅ Multiple Scenes Modal Dialog -->
  <dialog id="multiSceneModal" class="w-full max-w-md p-6 bg-white text-black rounded-xl shadow">
    <form method="POST" action="{{ url_for('films.add_multiple_scenes', film_id=film.id) }}">
      <h3 class="text-xl font-bold mb-4">Add Multiple Scenes</h3>

      <label class="block mb-2">Start Prefix (3-digit number)</label>
      <input type="number" name="prefix" id="prefixInput" min="1" max="999" required pattern="^[0-9]{3}$" maxlength="3" value="010"
        class="w-full px-3 py-2 border rounded mb-4" />

      <label class="block mb-2">How many scenes?</label>
      <input type="number" name="count" min="1" required class="w-full px-3 py-2 border rounded mb-4" />

      <label class="block mb-2">Optional Description</label>
      <input type="text" name="description" class="w-full px-3 py-2 border rounded mb-4" />

      <label class="block mb-2">Start Date</label>
      <input type="date" name="start_date" class="w-full px-3 py-2 border rounded mb-4" value="{{ storyboard_start }}">

      <label class="block mb-2">Due Date</label>
      <input type="date" name="due_date" class="w-full px-3 py-2 border rounded mb-4" value="{{ storyboard_end }}">

      <div class="flex items-center gap-2 mb-4">
        <input type="checkbox" name="include_thumbnail" checked class="form-checkbox h-5 w-5 text-blue-600">
        <span>Include Thumbnail Step</span>
      </div>

      <div class="flex justify-end gap-2">
        <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded">Add</button>
        <button type="button" onclick="this.closest('dialog').close()" class="text-red-600">Cancel</button>
      </div>
    </form>
  </dialog>

  <form id="add-scene-form" method="POST" action="{{ url_for('films.add_scene_route', film_id=film.id) }}"
    class="space-y-4">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div>
        <label class="text-white block mb-1">Scene Number (3 letters)</label>
        <input type="text" name="scene_number" class="w-full p-2 rounded text-black" value="010" required>
      </div>
      <div>
        <label class="text-white block mb-1">Start Date</label>
        <input type="date" name="start_date" class="w-full p-2 rounded text-black" value="{{ storyboard_start }}">
      </div>
      <div>
        <label class="text-white block mb-1">Due Date</label>
        <input type="date" name="due_date" class="w-full p-2 rounded text-black" value="{{ storyboard_end }}">
      </div>
    </div>

    <div>
      <label class="text-white block mb-1">Description</label>
      <textarea name="description" class="w-full p-2 rounded h-32 text-black"></textarea>
    </div>

    <div>
      <label class="inline-flex items-center mt-2">
        <input type="checkbox" name="include_thumbnail" checked class="form-checkbox h-5 w-5 text-blue-600">
        <span class="ml-2 text-white">Include Thumbnail Step</span>
      </label>
    </div>

    <div class="flex justify-between">
      <a href="{{ url_for('films.view_scenes', film_id=film.id) }}"
        class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded">Cancel</a>
      <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded">Create Scene</button>
    </div>
  </form>
</div>


<script>
  function updateStepOptions() {
    const selectedWorkflow = document.querySelector("select[name='workflow_id']").value;
    const options = document.querySelectorAll("#step_ids option");

    options.forEach(opt => {
      if (!selectedWorkflow || opt.dataset.parent !== selectedWorkflow) {
        opt.hidden = true;
        opt.disabled = true;
      } else {
        opt.hidden = false;
        opt.disabled = false;
      }
    });
  }

  document.addEventListener("DOMContentLoaded", function () {
    const workflowSelect = document.querySelector("select[name='workflow_id']");
    if (workflowSelect) {
      workflowSelect.addEventListener("change", updateStepOptions);
      updateStepOptions(); // Run once on page load
    }
  });
</script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const deleteButton = document.getElementById("deleteSceneButton");
    const form = document.getElementById("deleteSceneForm");

    deleteButton?.addEventListener("click", function () {
      Swal.fire({
        title: "Are you sure?",
        text: "This will permanently delete the scene.",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#d33",
        cancelButtonColor: "#3085d6",
        confirmButtonText: "Yes, delete it!",
      }).then((result) => {
        if (result.isConfirmed) {
          form.submit();
        }
      });
    });
  });
</script>


<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("add-scene-form");
    if (!form) return;

    form.addEventListener("submit", function (e) {
      e.preventDefault(); // Prevent default form submit

      const formData = new FormData(form);
      fetch(form.action, {
        method: "POST",
        headers: {
          "X-Requested-With": "XMLHttpRequest"
        },
        body: formData
      })
        .then(async res => {
          const contentType = res.headers.get("content-type");
          const isJson = contentType && contentType.includes("application/json");

          if (!isJson) {
            const text = await res.text();
            throw new Error("Server did not return JSON. Debug:\n" + text);
          }

          const data = await res.json();

          if (res.ok && data.success) {
            Swal.fire({
              icon: "success",
              title: "Scene Added!",
              text: "Your scene has been created.",
              timer: 1500,
              showConfirmButton: false
            }).then(() => {
              window.location.href = `/films/{{ film.id }}/scenes`;
            });
          } else {
            throw new Error(data.message || "Unknown error");
          }
        })
        .catch(err => {
          Swal.fire({
            icon: "error",
            title: "Server Error",
            text: err.message
          });
        });

    });
  });
</script>


<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const prefixInput = document.getElementById("prefixInput");
    if (prefixInput) {
      prefixInput.addEventListener("input", (e) => {
        e.target.value = e.target.value.replace(/\D/g, '').slice(0, 3);
      });
    }
  });
</script>

{% with messages = get_flashed_messages() %}
{% if messages %}
<script>
  Swal.fire({
    icon: "success",
    title: "Success",
    text: {{ messages[0]| tojson }},
    timer: 1800,
    showConfirmButton: false
      });
</script>
{% endif %}
{% endwith %}

{% endblock %}
